server {
    listen 80;
    server_name cotizaciones.copselectronics.com;

    # Aumentar límites para peticiones al chatbot (JSON + catálogo grande)
    client_max_body_size 5M;
    proxy_read_timeout 180s;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://localhost:3001/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
# Nota: Ollama (puerto 11434) NO debe tener bloque nginx — solo accesible desde localhost
